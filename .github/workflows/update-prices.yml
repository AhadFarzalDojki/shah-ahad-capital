name: Update Firebase Stock Prices
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install firebase-admin node-fetch@2
      - name: Write service account
  env:
    SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
  run: echo "$SA" > serviceaccount.json
      - name: Run update script
        env:
          DATABASE_URL: "https://tracker-b57d5-default-rtdb.asia-southeast1.firebasedatabase.app"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: node update-script.js
