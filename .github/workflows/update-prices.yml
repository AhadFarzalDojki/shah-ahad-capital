name: Update Firebase Stock Prices
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install firebase-admin node-fetch@2
      - name: Write service account
        env:
          SA: ${{ secrets.FIREBASE_SA_BASE64 }}
        run: |
          echo "$SA" | base64 -d > /tmp/sa_raw.json
          python3 -c "
import json
with open('/tmp/sa_raw.json') as f:
    d = json.load(f)
d['private_key'] = d['private_key'].replace('\\\\n', '\\n')
with open('serviceaccount.json', 'w') as f:
    json.dump(d, f)
"
      - name: Debug service account
        run: |
          echo "File size: $(wc -c < serviceaccount.json)"
          echo "Is valid JSON: $(python3 -m json.tool serviceaccount.json > /dev/null 2>&1 && echo YES || echo NO)"
          echo "Has cert key: $(python3 -c "import json; d=json.load(open('serviceaccount.json')); print('YES' if 'private_key' in d else 'NO')" 2>/dev/null || echo FAILED)"
          echo "Key starts with: $(python3 -c "import json; d=json.load(open('serviceaccount.json')); print(d['private_key'][:40])" 2>/dev/null)"
      - name: Run update script
        env:
          DATABASE_URL: "https://tracker-b57d5-default-rtdb.asia-southeast1.firebasedatabase.app"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: node update-script.js
